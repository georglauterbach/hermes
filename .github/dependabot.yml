---
version: 2

updates:
  - package-ecosystem: cargo
    directory: code/
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::dependencies

  - package-ecosystem: devcontainers
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::infrastructure

  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::ci
