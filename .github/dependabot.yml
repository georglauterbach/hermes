---
version: 2

updates:
  - package-ecosystem: cargo
    directory: code/
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::dependencies
    groups:
      cargo-minor-and-patch:
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: devcontainers
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::infrastructure

  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels:
      - kind::update
      - area::ci
