      interval: monthly
    assignees: [ georglauterbach ]
    labels: [ area::ci, kind::update ]

  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: monthly
    assignees: [ georglauterbach ]
    labels: [ area::ci, kind::update ]
